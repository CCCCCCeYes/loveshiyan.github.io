# Butterfly Theme Custom Configuration - Romantic Style

# 主题配色 - 浪漫粉紫色系
# https://github.com/jerryc127/hexo-theme-butterfly/blob/main/_config.yml
# -------------------------------------------------
# 主色调
# accent_color: '#ff66cc'  # 粉色
# accent_color: '#9966ff'  # 淡紫色
accent_color: '#ff6b9d'  # 浪漫粉红
# 文字颜色
text_color: '#4a4a4a'
# 背景色
background_color: '#fdf6f9'  # 极淡的粉紫背景
# 链接颜色
link_color: '#ff6b9d'
# 链接悬停颜色
link_hover_color: '#ff3399'

# 头像
# avatar:
#   enable: true
#   url: https://avatars.githubusercontent.com/u/12345678?v=4
#   rounded: true
#   opacity: 1
#   offset:
#   error: https://avatars.githubusercontent.com/u/12345678?v=4

# 导航栏
menu:
  Home: / || fas fa-home
  Archives: /archives/ || fas fa-archive
  Tags: /tags/ || fas fa-tags
  Categories: /categories/ || fas fa-folder
  关于: /about/ || fas fa-heart

# 搜索
# search:
#   enable: true
#   path: search.json
#   field: post
#   content: true
#   format: html

# 代码块样式
# 使用柔和配色
prismjs:
  enable: true
  preprocess: true
  line_number: true
  tab_replace: ''
  language:
    - js
    - css
    - python
    - bash
    - json
    - yaml
    - markdown
  prismjs:
    css:
    - prism-tomorrow.css

# 社交链接 - 右侧栏
# social:
#   enable: true
#   animation: flip  # 动画类型: flip, rotate, wave...
#   links:
#     github: https://github.com/xxx || fab fa-github
#     twitter: https://twitter.com/xxx || fab fa-twitter
#     weibo: https://weibo.com/xxx || fab fa-weibo
#     email: mailto:xxx@example.com || fas fa-envelope
#     qq: http://wpa.qq.com/msgrd?v=3&uin=123456&site=qq || fab fa-qq
#     telegram: https://t.me/xxx || fab fa-telegram
#     rss: /atom.xml || fas fa-rss

# 社交链接：只显示邮箱
social:
  enable: true
  animation: flip
  links:
    email: mailto:nazeyale@gmail.com || fas fa-envelope

# 页面底部版权
# copyright:
#   enable: true
#   content: Copyright © <a href="<%- url_for('/') %>" rel="noopener"><%- config.author || config.title %></a> |Powered by <a href="https://hexo.io/" target="_blank" rel="noopener">Hexo</a> |Theme by <a href="https://github.com/jerryc127/hexo-theme-butterfly" target="_blank" rel="noopener">Butterfly</a>

copyright:
  enable: true
  content: '© 2026 bobo | 用 <a href="https://hexo.io/" target="_blank" rel="noopener">Hexo</a> 搭建 | Theme <a href="https://github.com/jerryc127/hexo-theme-butterfly" target="_blank" rel="noopener">Butterfly</a>'

# 文章页设置
# 相关文章
# related_post:
#   enable: true
#   title: 相关文章
#   subtitle: ''
#   numbers: 3
#   container: null  # null = .post
#   item_container: .card
#   item_class: null

# 文章打赏
donate:
  enable: false  # 关闭打赏

# 文章目录
toc:
  enable: true
  max_depth: 3

# 侧边栏
sidebar:
  # 文章页侧边栏位置：left/right
  position: right
  # 宽度（占屏幕百分比）
  width: 30%
  # 侧边栏显示模块
  # 可选：post, profile, recent_posts, categories, tags, toc, archives, tagcloud, friends, custom
  modules:
    - profile
    - categories
    - tags
    - toc

# 个人资料卡片（右侧栏）
profile:
  enable: true
  avatar: /img/avatar.svg  # 浪漫风格头像
  avatar_rounded: true
  title: bobo
  subtitle: 一个浪漫的人
  description: |
    喜欢简单的生活
    记录美好瞬间
    希望世界充满爱
  # 社交媒体链接（已在 social 模块）
  # social_links:
  #   github: https://github.com/xxx
  #   email: mailto:xxx@example.com
  # button:
  #   enable: false
  #   text: 关于我
  #   icon: fas fa-arrow-right
  #   link: /about/

# 标签云（右侧）
tagcloud:
  enable: true
  min_font: 14
  max_font: 24
  amount: 30
  orderby: name
  order: 1
  # 标签云颜色（从主题调色板）
  color: false

# 归档样式
archives:
  enable: true
  layout: archives
  title: 归档
  subtitle: ''
  per_page: 20
  order: -1
  content_order: -1

# 暗色模式切换
darkmode:
  enable: true
  # 切换动画
  animation: true
  # 记忆用户选择
  memory: true
  # 默认模式: auto/light/dark
  default: auto

# 页脚
footer:
  enable: true
  # 页脚自定义内容
  content: |
    <div style="text-align: center; color: #ff6b9d;">
      <i class="fas fa-heart" style="color: #ff6b9d;"></i> Made with love by bobo
    </div>

# 回到顶部按钮
back2top:
  enable: true
  icon: fas fa-arrow-up
  # 按钮样式：round/rectangle
  style: round

# 渐变文字效果（标题等）
# gradient_heading:
#   enable: true
#   start_color: '#ff6b9d'
#   end_color: '#9966ff'
#   animate: true
#   animation_duration: 3

# 鼠标点击效果（小心心等）
cursor_effect:
  enable: true
  # 可选：fireworks, heart, ring, none
  type: heart
  # 颜色
  color: '#ff6b9d'

# 相册（可选）
# gallery:
#   enable: false
#   layout: gallery
#   title: 相册
#   subtitle: ''
#   photos: []

# 评论区（可选）
# Disqus, Twikoo, Gitalk, etc.
# comments:
#   enable: false
#   ...

# 代码块复制按钮
copycode:
  enable: true
  # 样式：default, mac, windows
  style: default
  # 提示文字
  copy_text: 复制
  copied_text: 已复制!

